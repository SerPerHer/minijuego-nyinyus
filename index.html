<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyinyus - La Gran Aventura</title>
  <link rel="stylesheet" href="style.css?v=20260517f" />
</head>
<body>
  <div id="screen-controls">
    <button id="home-button" class="screen-control-button" type="button" aria-label="Volver a la pantalla inicial">
      <span class="screen-control-icon" aria-hidden="true">&#8592;</span>
      <span>Inicio</span>
    </button>
    <button id="save-button" class="screen-control-button hidden" type="button" aria-label="Guardar partida">
      <span class="screen-control-icon" aria-hidden="true">&#128190;</span>
      <span>Guardar</span>
    </button>
    <span id="save-status" class="hidden" role="status" aria-live="polite"></span>
  </div>

  <div id="audio-controls" class="hidden">
    <button id="mute-button" type="button">Musica: On</button>
    <label id="volume-control" for="volume-slider">
      <span>Volumen</span>
      <input id="volume-slider" type="range" min="0" max="100" value="100" />
    </label>
  </div>

  <main id="game">
    <section id="intro-screen">
      <img
        class="title-art"
        src="assets/backgrounds/la_gran_aventura.png"
        alt="La Gran Aventura"
      />
      <p>Haz sonar la llamada del mar y abre la puerta de la aventura (apreta F11).</p>
      <button id="intro-button">Comenzar</button>
    </section>

    <section id="start-screen" class="hidden">
      <img
        class="title-art title-art-nyinyus"
        src="assets/backgrounds/nyinyus.png"
        alt="Nyinyus"
      />
      <p>El horizonte arde en promesas, el viento cambia de rumbo y el mar ya susurra vuestro nombre.</p>
      <p>Hoy no empieza solo un viaje. Empieza una leyenda que nadie podrá olvidar.</p>
      <div id="resume-panel" class="hidden">
        <button id="continue-button" class="scenario-button" type="button">Continuar partida guardada</button>
        <button id="clear-save-button" class="secondary-button" type="button">Borrar guardado</button>
      </div>
      <div id="scenario-select">
        <button class="scenario-button" data-start-scene="start">Introduccion</button>
        <button class="scenario-button" data-start-scene="toki_hanashima_llegada">Isla Toki no Hanashima</button>
        <button class="scenario-button" data-start-scene="tempestaria_llegada">Isla Tempestaria</button>
        <button class="scenario-button" data-start-scene="rabbita_llegada">Isla Rabbita</button>
        <button class="scenario-button" data-start-scene="ornithea_llegada">Isla Ornithea</button>
        <button class="scenario-button" data-start-scene="eirene_llegada">Isla Eirene</button>
        <button class="scenario-button" data-start-scene="final_historia">Final de la historia</button>
      </div>
    </section>

    <section id="game-screen" class="hidden">
      <div id="background-layer"></div>
      <div id="character-layer"></div>
      <div id="inspect-prompt" class="hidden"></div>
      <div id="credits-overlay" class="hidden" aria-hidden="true">
        <div id="credits-viewport">
          <div id="credits-roll"></div>
        </div>
        <div id="credits-lyrics" class="hidden" aria-live="polite">
          <div id="credits-lyric-current"></div>
          <div id="credits-lyric-next"></div>
        </div>
      </div>

      <div id="dialogue-box">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
        <div id="choice-box" class="hidden"></div>
        <div id="dialogue-actions">
          <button id="back-button" type="button">Atrás</button>
          <button id="next-button">Siguiente</button>
        </div>
      </div>
    </section>
  </main>

  <div id="inspect-overlay" class="hidden" aria-hidden="true">
    <div id="inspect-panel">
      <button id="inspect-close" type="button" aria-label="Cerrar imagen">X</button>
      <img id="inspect-image" src="" alt="" />
    </div>
  </div>

  <script src="scenes/characters.js?v=20260517a"></script>
  <script src="scenes/intro.js?v=20260511a"></script>
  <script src="scenes/isla-toki-no-hanashima.js?v=20260511b"></script>
  <script src="scenes/isla-tempestaria.js?v=20260511a"></script>
  <script src="scenes/isla-rabbita.js?v=20260517b"></script>
  <script src="scenes/isla-ornithea.js?v=20260517a"></script>
  <script src="scenes/isla-eirene.js?v=20260517c"></script>
  <script src="scenes/final-historia.js?v=20260517d"></script>
  <script src="game.js?v=20260517g"></script>
  <script src="minijuego_mesas_boda.js?v=20260513a"></script>
  <script src="minijuego_laberinto.js?v=20260513b"></script>
  <script src="minijuego_engranajes.js?v=20260513a"></script>
</body>
</html>
