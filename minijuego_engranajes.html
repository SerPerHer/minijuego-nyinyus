<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUERTA SUBTERRANEA DE RABBITA</title>
  <style>
    :root {
      --bg: #090b0d;
      --stone: #1b1c1d;
      --stone-light: #2c2b28;
      --metal: #252421;
      --metal-light: #55504a;
      --metal-dark: #0d0e0f;
      --gold: #c38a35;
      --gold-light: #ffd27a;
      --gold-dark: #4e3214;
      --text: #f6e9cb;
      --muted: #cdbf9b;
      --danger: #16120d;
      --shadow: rgba(0, 0, 0, 0.58);
      --scene-image: url("assets/backgrounds/puerta_rabbita_engranajes.png");
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 8% 78%, rgba(255, 165, 40, 0.32), transparent 17rem),
        radial-gradient(circle at 76% 30%, rgba(196, 120, 35, 0.15), transparent 22rem),
        radial-gradient(circle at 48% 18%, rgba(114, 96, 62, 0.18), transparent 20rem),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.025) 0 2px, transparent 2px 17px),
        linear-gradient(155deg, #050607 0%, #111518 44%, #090a0b 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 201, 108, 0.12), transparent 10rem),
        radial-gradient(circle at 92% 58%, rgba(255, 156, 39, 0.14), transparent 12rem),
        linear-gradient(90deg, rgba(0, 0, 0, 0.52), transparent 22%, transparent 76%, rgba(0, 0, 0, 0.58));
      mix-blend-mode: screen;
    }

    button {
      border: 0;
      color: #20160a;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(180deg, #ffe0a2 0%, #c89138 52%, #845518 100%);
      border-radius: 8px;
      padding: 0.78rem 1.05rem;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.62),
        inset 0 -3px 0 rgba(78, 45, 8, 0.45),
        0 8px 18px rgba(0, 0, 0, 0.42);
      transition: transform 160ms ease, filter 160ms ease;
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    [hidden] {
      display: none !important;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1220px, 100%);
      margin: 0 auto;
      padding: clamp(16px, 3vw, 34px);
    }

    .play-area {
      position: relative;
      display: grid;
      grid-template-columns: minmax(216px, 1fr) clamp(90px, 21vw, 250px);
      gap: clamp(8px, 2vw, 18px);
      align-items: stretch;
      isolation: isolate;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(4, 5, 6, 0.03), rgba(4, 5, 6, 0.18)),
        var(--scene-image) left center / cover no-repeat,
        #0b0c0d;
      overflow: hidden;
      box-shadow:
        0 30px 70px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(223, 158, 67, 0.18);
    }

    .machine-frame,
    .gear-tray {
      height: clamp(410px, 60vw, 690px);
    }

    .machine-frame {
      position: relative;
      padding: 0;
      border-radius: 18px;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: hidden;
    }

    .machine-panel {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .holes-layer {
      position: absolute;
      inset: 0;
    }

    .holes-layer {
      z-index: 4;
      pointer-events: none;
    }

    .hole {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.04) 0 43%, rgba(0, 0, 0, 0.36) 44% 58%, rgba(13, 10, 7, 0.18) 59% 100%);
      border: 3px solid rgba(255, 200, 101, 0.82);
      box-shadow:
        inset 0 0 24px rgba(0, 0, 0, 0.78),
        inset 0 9px 18px rgba(0, 0, 0, 0.58),
        0 0 0 2px rgba(37, 24, 9, 0.7),
        0 8px 18px rgba(0, 0, 0, 0.38);
      transition: border-color 180ms ease, box-shadow 220ms ease;
    }

    .hole::before {
      display: none;
    }

    .hole::after {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 1px solid rgba(255, 233, 184, 0.26);
      box-shadow: inset 0 0 22px rgba(0, 0, 0, 0.62);
    }

    .hole.is-filled {
      border-color: rgba(255, 211, 120, 0.95);
      box-shadow:
        inset 0 0 20px rgba(0, 0, 0, 0.88),
        0 0 0 3px rgba(77, 51, 18, 0.85),
        0 0 18px rgba(255, 184, 68, 0.35),
        0 12px 24px rgba(0, 0, 0, 0.58);
    }

    .glow-core {
      position: absolute;
      z-index: 1;
      inset: 10%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 199, 83, 0.26), transparent 58%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 550ms ease;
    }

    .gear-tray {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0.7rem;
      z-index: 8;
      padding: clamp(8px, 1.5vw, 16px);
      border-radius: 16px;
      background:
        linear-gradient(90deg, rgba(255, 208, 117, 0.25), transparent 10%, transparent 90%, rgba(255, 208, 117, 0.18)),
        radial-gradient(circle at 52% 16%, rgba(255, 191, 76, 0.13), transparent 12rem),
        linear-gradient(180deg, rgba(37, 34, 30, 0.5), rgba(21, 21, 21, 0.46) 50%, rgba(12, 13, 13, 0.64));
      border: 1px solid rgba(224, 157, 64, 0.4);
      box-shadow:
        inset 0 0 0 2px rgba(0, 0, 0, 0.44),
        inset 0 0 40px rgba(0, 0, 0, 0.55),
        0 26px 55px rgba(0, 0, 0, 0.5);
    }

    .tray-title {
      color: #ffe5ad;
      font-weight: 800;
      text-align: center;
      text-shadow: 0 2px 8px #000;
    }

    .dock-list {
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      gap: clamp(6px, 1vw, 12px);
      min-height: 0;
    }

    .dock {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 0;
      border-radius: 14px;
      background:
        radial-gradient(circle, rgba(0, 0, 0, 0.5) 0 38%, transparent 39%),
        linear-gradient(180deg, rgba(255, 226, 153, 0.08), rgba(0, 0, 0, 0.16));
      border: 1px solid rgba(255, 219, 142, 0.13);
      box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.62);
    }

    .dock::before {
      content: "";
      width: min(68%, 92px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px dashed rgba(255, 209, 121, 0.22);
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.72);
    }

    .drag-layer {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    .gear {
      position: absolute;
      left: 0;
      top: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      cursor: grab;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      filter: drop-shadow(0 12px 16px rgba(0, 0, 0, 0.58));
      transition: left 280ms cubic-bezier(0.2, 0.85, 0.24, 1), top 280ms cubic-bezier(0.2, 0.85, 0.24, 1), filter 180ms ease, opacity 180ms ease;
      will-change: left, top;
    }

    .gear.dragging {
      cursor: grabbing;
      filter:
        drop-shadow(0 18px 22px rgba(0, 0, 0, 0.68))
        drop-shadow(0 0 16px rgba(255, 195, 82, 0.28));
      transition: filter 120ms ease;
    }

    .gear.is-placed {
      filter:
        drop-shadow(0 12px 16px rgba(0, 0, 0, 0.56))
        drop-shadow(0 0 9px rgba(255, 194, 81, 0.2));
    }

    .gear-art {
      width: 100%;
      height: 100%;
      transform-origin: 50% 50%;
      display: block;
    }

    .gear.is-spinning .gear-art {
      animation: gearSpin var(--spin-speed, 2.4s) linear infinite;
      animation-direction: var(--spin-direction, normal);
    }

    @keyframes gearSpin {
      to {
        transform: rotate(360deg);
      }
    }

    .play-area.is-complete .gear {
      cursor: default;
      pointer-events: none;
    }

    .play-area.is-complete .machine-frame {
      box-shadow:
        inset 0 0 0 2px rgba(255, 216, 132, 0.24),
        inset 0 -26px 54px rgba(0, 0, 0, 0.42),
        0 0 46px rgba(255, 186, 70, 0.28),
        0 26px 55px rgba(0, 0, 0, 0.55);
    }

    .play-area.is-complete .glow-core {
      opacity: 1;
      animation: goldenPulse 1.6s ease-in-out infinite alternate;
    }

    @keyframes goldenPulse {
      from {
        filter: blur(0);
        transform: scale(0.96);
      }
      to {
        filter: blur(4px);
        transform: scale(1.04);
      }
    }

    .victory-panel {
      position: absolute;
      z-index: 40;
      left: 50%;
      top: 50%;
      width: min(92%, 520px);
      transform: translate(-50%, -50%);
      display: grid;
      gap: 1rem;
      justify-items: center;
      padding: clamp(22px, 4vw, 36px);
      text-align: center;
      border-radius: 16px;
      color: #fff4d7;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 211, 119, 0.34), transparent 42%),
        linear-gradient(180deg, rgba(39, 31, 22, 0.96), rgba(11, 12, 12, 0.96));
      border: 1px solid rgba(255, 211, 126, 0.52);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.58),
        0 28px 70px rgba(0, 0, 0, 0.72),
        0 0 44px rgba(255, 187, 70, 0.23);
    }

    .victory-panel p {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 2.5rem);
      font-weight: 900;
      text-shadow: 0 3px 12px #000;
    }

    .victory-mark {
      width: clamp(60px, 12vw, 92px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #fff3c9 0 9%, transparent 10%),
        repeating-conic-gradient(from 0deg, #ffd374 0 10deg, #6f4213 10deg 22deg);
      border: 4px solid #c98c33;
      box-shadow:
        inset 0 0 0 10px rgba(35, 22, 9, 0.72),
        0 0 28px rgba(255, 192, 80, 0.45);
      animation: gearSpin 3.2s linear infinite;
    }

    @media (max-width: 680px) {
      .page {
        padding: 14px;
      }

      .play-area {
        grid-template-columns: minmax(214px, 1fr) clamp(84px, 24vw, 112px);
      }

      .machine-frame,
      .gear-tray {
        height: clamp(300px, 78vw, 430px);
      }

      .tray-title {
        font-size: 0.82rem;
      }
    }

    @media (max-width: 380px) {
      .page {
        padding: 10px;
      }

      .play-area {
        grid-template-columns: minmax(198px, 1fr) 78px;
        gap: 7px;
      }

      .gear-tray {
        padding: 7px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="play-area" id="playArea" aria-label="Puzzle de engranajes">
      <section class="machine-frame" aria-label="Maquinaria antigua">
        <div class="machine-panel" id="machinePanel">
          <div class="glow-core" aria-hidden="true"></div>
        </div>
      </section>

      <aside class="gear-tray" id="gearTray" aria-label="Panel lateral de engranajes">
        <div class="tray-title">Engranajes</div>
        <div class="dock-list" id="dockList"></div>
      </aside>

      <div class="holes-layer" id="holesLayer" aria-hidden="true"></div>
      <div class="drag-layer" id="dragLayer"></div>

      <div class="victory-panel" id="victoryPanel" role="dialog" aria-live="polite" hidden>
        <div class="victory-mark" aria-hidden="true"></div>
        <p>¡La maquinaria vuelve a funcionar!</p>
        <button id="continueButton" type="button" hidden>Continuar</button>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      /*
        Configuracion principal.
        x/y son coordenadas en pixeles sobre puerta_rabbita_engranajes.png.
        size y tolerance tambien usan esa escala base para que los huecos
        sigan encajando aunque el fondo cambie de tamano.
      */
      const sceneConfig = {
        width: 1672,
        height: 941
      };

      const slotConfig = [
        { id: "slot1", gearId: "gear1", size: 265, x: 414, y: 246, spin: "clockwise", tolerance: 82 },
        { id: "slot2", gearId: "gear2", size: 215, x: 628, y: 421, spin: "counterclockwise", tolerance: 70 },
        { id: "slot3", gearId: "gear3", size: 160, x: 416, y: 612, spin: "counterclockwise", tolerance: 58 },
        { id: "slot4", gearId: "gear4", size: 245, x: 852, y: 612, spin: "clockwise", tolerance: 82 },
        { id: "slot5", gearId: "gear5", size: 190, x: 855, y: 246, spin: "clockwise", tolerance: 64 }
      ];

      const gearConfig = [
        { id: "gear1", sizeName: "grande", diameter: 190, teeth: 16, spokes: 8, color: "#bd8230", dark: "#4a2b0f", light: "#ffe1a0", speed: "2.6s" },
        { id: "gear2", sizeName: "mediano", diameter: 158, teeth: 14, spokes: 7, color: "#9e9a8f", dark: "#383833", light: "#f1e7ce", speed: "2.1s" },
        { id: "gear3", sizeName: "pequeno", diameter: 116, teeth: 12, spokes: 6, color: "#d6a04a", dark: "#573513", light: "#ffe8ad", speed: "1.75s" },
        { id: "gear4", sizeName: "grande", diameter: 182, teeth: 18, spokes: 8, color: "#7d7364", dark: "#27231d", light: "#e2d4bb", speed: "2.9s" },
        { id: "gear5", sizeName: "pequeno", diameter: 110, teeth: 12, spokes: 5, color: "#c88a39", dark: "#4b2f11", light: "#ffd998", speed: "1.65s" }
      ];

      const playArea = document.getElementById("playArea");
      const holesLayer = document.getElementById("holesLayer");
      const dockList = document.getElementById("dockList");
      const dragLayer = document.getElementById("dragLayer");
      const resetButton = document.getElementById("resetButton");
      const continueButton = document.getElementById("continueButton");
      const victoryPanel = document.getElementById("victoryPanel");

      const slotsByGearId = new Map(slotConfig.map((slot) => [slot.gearId, slot]));
      const gearState = new Map();

      let activeDrag = null;
      let zCounter = 30;
      let isCompleted = false;
      let resizeFrame = 0;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getBoardScale() {
        return getSceneMetrics().scale;
      }

      function getSceneMetrics() {
        const rect = playArea.getBoundingClientRect();
        const scale = Math.max(rect.width / sceneConfig.width, rect.height / sceneConfig.height);

        return {
          scale,
          offsetX: 0,
          offsetY: (rect.height - sceneConfig.height * scale) / 2
        };
      }

      function createBoard() {
        slotConfig.forEach(createHole);
        gearConfig.forEach(createDock);
        gearConfig.forEach(createGear);
        relayout();
      }

      function createHole(slot) {
        const hole = document.createElement("div");
        hole.className = "hole";
        hole.id = slot.id;
        holesLayer.appendChild(hole);
      }

      function createDock(gear) {
        const dock = document.createElement("div");
        dock.className = "dock";
        dock.id = `dock-${gear.id}`;
        dock.setAttribute("aria-hidden", "true");
        dockList.appendChild(dock);
      }

      function createGear(gear) {
        const element = document.createElement("div");
        element.className = "gear";
        element.id = gear.id;
        element.tabIndex = 0;
        element.setAttribute("role", "img");
        element.setAttribute("aria-label", `${gear.id}, engranaje ${gear.sizeName}`);
        element.style.setProperty("--spin-speed", gear.speed);
        element.innerHTML = buildGearSvg(gear);

        element.addEventListener("pointerdown", onPointerDown);
        dragLayer.appendChild(element);

        gearState.set(gear.id, {
          placed: false,
          element
        });
      }

      function buildGearSvg(gear) {
        const gradientId = `grad-${gear.id}`;
        const path = gearPath(gear.teeth, 58, 47);
        const spokes = Array.from({ length: gear.spokes }, (_, index) => {
          const angle = (360 / gear.spokes) * index;
          return `<rect x="-5" y="-40" width="10" height="36" rx="4" transform="rotate(${angle})" fill="url(#${gradientId})" opacity="0.88"></rect>`;
        }).join("");
        const bolts = Array.from({ length: gear.spokes }, (_, index) => {
          const angle = ((360 / gear.spokes) * index - 90) * Math.PI / 180;
          const x = Math.cos(angle) * 42;
          const y = Math.sin(angle) * 42;
          return `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="2.8" fill="${gear.light}" opacity="0.72"></circle>`;
        }).join("");

        return `
          <svg class="gear-art" viewBox="-64 -64 128 128" aria-hidden="true">
            <defs>
              <radialGradient id="${gradientId}" cx="35%" cy="28%">
                <stop offset="0%" stop-color="${gear.light}"></stop>
                <stop offset="48%" stop-color="${gear.color}"></stop>
                <stop offset="100%" stop-color="${gear.dark}"></stop>
              </radialGradient>
            </defs>
            <path d="${path}" fill="url(#${gradientId})" stroke="#1c1309" stroke-width="3" stroke-linejoin="round"></path>
            <circle r="43" fill="none" stroke="rgba(255,238,192,0.34)" stroke-width="3"></circle>
            <circle r="34" fill="rgba(22,18,13,0.34)" stroke="rgba(0,0,0,0.45)" stroke-width="4"></circle>
            <g>${spokes}</g>
            <circle r="18" fill="url(#${gradientId})" stroke="#1b1208" stroke-width="4"></circle>
            <circle r="7" fill="#11100e" stroke="rgba(255,229,172,0.55)" stroke-width="3"></circle>
            <g>${bolts}</g>
          </svg>
        `;
      }

      function gearPath(teeth, outerRadius, innerRadius) {
        const points = teeth * 2;
        let path = "";

        for (let index = 0; index < points; index += 1) {
          const angle = (index / points) * Math.PI * 2 - Math.PI / 2;
          const radius = index % 2 === 0 ? outerRadius : innerRadius;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          path += `${index === 0 ? "M" : "L"} ${x.toFixed(2)} ${y.toFixed(2)} `;
        }

        return `${path}Z`;
      }

      function relayout() {
        const scene = getSceneMetrics();
        positionHoles(scene);

        gearConfig.forEach((gear) => {
          const state = gearState.get(gear.id);
          const element = state.element;
          const size = Math.round(clamp(gear.diameter * scene.scale, 54, 168));
          element.style.width = `${size}px`;
          element.style.height = `${size}px`;

          if (activeDrag && activeDrag.gearId === gear.id) {
            return;
          }

          if (state.placed) {
            moveGearToSlot(gear.id, false);
          } else {
            moveGearHome(gear.id, false);
          }
        });
      }

      function positionHoles(scene) {
        slotConfig.forEach((slot) => {
          const hole = document.getElementById(slot.id);
          const size = Math.round(slot.size * scene.scale);
          hole.style.left = `${scene.offsetX + slot.x * scene.scale}px`;
          hole.style.top = `${scene.offsetY + slot.y * scene.scale}px`;
          hole.style.width = `${size}px`;
          hole.style.height = `${size}px`;
        });
      }

      function onPointerDown(event) {
        if (isCompleted) {
          return;
        }

        const element = event.currentTarget;
        const gearId = element.id;
        const state = gearState.get(gearId);
        const gearRect = element.getBoundingClientRect();
        const playRect = playArea.getBoundingClientRect();

        event.preventDefault();

        if (state.placed) {
          state.placed = false;
          markSlotFilled(slotsByGearId.get(gearId), false);
          element.classList.remove("is-placed");
        }

        activeDrag = {
          gearId,
          pointerId: event.pointerId,
          offsetX: event.clientX - gearRect.left,
          offsetY: event.clientY - gearRect.top,
          playLeft: playRect.left,
          playTop: playRect.top
        };

        element.classList.add("dragging");
        element.style.zIndex = String(++zCounter);
        element.setPointerCapture(event.pointerId);
        element.addEventListener("pointermove", onPointerMove);
        element.addEventListener("pointerup", onPointerUp);
        element.addEventListener("pointercancel", onPointerCancel);
      }

      function onPointerMove(event) {
        if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
          return;
        }

        const state = gearState.get(activeDrag.gearId);
        const x = event.clientX - activeDrag.playLeft - activeDrag.offsetX;
        const y = event.clientY - activeDrag.playTop - activeDrag.offsetY;
        state.element.style.left = `${x}px`;
        state.element.style.top = `${y}px`;
      }

      function onPointerUp(event) {
        finishDrag(event, true);
      }

      function onPointerCancel(event) {
        finishDrag(event, false);
      }

      function finishDrag(event, shouldCheckSnap) {
        if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
          return;
        }

        const gearId = activeDrag.gearId;
        const state = gearState.get(gearId);
        const element = state.element;

        element.classList.remove("dragging");
        element.removeEventListener("pointermove", onPointerMove);
        element.removeEventListener("pointerup", onPointerUp);
        element.removeEventListener("pointercancel", onPointerCancel);

        try {
          element.releasePointerCapture(event.pointerId);
        } catch (error) {
          // Algunos navegadores liberan la captura automaticamente.
        }

        activeDrag = null;

        if (shouldCheckSnap && isNearCorrectSlot(gearId)) {
          state.placed = true;
          element.classList.add("is-placed");
          markSlotFilled(slotsByGearId.get(gearId), true);
          moveGearToSlot(gearId, true);
          checkVictory();
        } else {
          state.placed = false;
          element.classList.remove("is-placed");
          markSlotFilled(slotsByGearId.get(gearId), false);
          moveGearHome(gearId, true);
        }
      }

      function isNearCorrectSlot(gearId) {
        const slot = slotsByGearId.get(gearId);
        const state = gearState.get(gearId);
        const gearCenter = getElementCenterInPlay(state.element);
        const slotCenter = getSlotCenterInPlay(slot);
        const scale = getBoardScale();
        const distance = Math.hypot(gearCenter.x - slotCenter.x, gearCenter.y - slotCenter.y);

        return distance <= slot.tolerance * scale;
      }

      function moveGearToSlot(gearId, animate) {
        const slot = slotsByGearId.get(gearId);
        const state = gearState.get(gearId);
        const center = getSlotCenterInPlay(slot);
        setGearCenter(state.element, center, animate);
      }

      function moveGearHome(gearId, animate) {
        const state = gearState.get(gearId);
        const dock = document.getElementById(`dock-${gearId}`);
        const center = getElementCenterInPlay(dock);
        setGearCenter(state.element, center, animate);
      }

      function setGearCenter(element, center, animate) {
        element.style.transitionDuration = animate ? "" : "0ms";
        element.style.left = `${center.x - element.offsetWidth / 2}px`;
        element.style.top = `${center.y - element.offsetHeight / 2}px`;

        if (!animate) {
          requestAnimationFrame(() => {
            element.style.transitionDuration = "";
          });
        }
      }

      function getSlotCenterInPlay(slot) {
        const scene = getSceneMetrics();

        return {
          x: scene.offsetX + slot.x * scene.scale,
          y: scene.offsetY + slot.y * scene.scale
        };
      }

      function getElementCenterInPlay(element) {
        const playRect = playArea.getBoundingClientRect();
        const rect = element.getBoundingClientRect();

        return {
          x: rect.left - playRect.left + rect.width / 2,
          y: rect.top - playRect.top + rect.height / 2
        };
      }

      function markSlotFilled(slot, filled) {
        const hole = document.getElementById(slot.id);
        hole.classList.toggle("is-filled", filled);
      }

      function checkVictory() {
        const allPlaced = gearConfig.every((gear) => gearState.get(gear.id).placed);

        if (!allPlaced || isCompleted) {
          return;
        }

        isCompleted = true;
        playArea.classList.add("is-complete");
        victoryPanel.hidden = false;
        continueButton.hidden = false;

        gearConfig.forEach((gear) => {
          const slot = slotsByGearId.get(gear.id);
          const state = gearState.get(gear.id);
          const direction = slot.spin === "counterclockwise" ? "reverse" : "normal";
          state.element.style.setProperty("--spin-direction", direction);
          state.element.classList.add("is-spinning");
        });
      }

      function resetPuzzle() {
        isCompleted = false;
        activeDrag = null;
        playArea.classList.remove("is-complete");
        victoryPanel.hidden = true;
        continueButton.hidden = true;

        slotConfig.forEach((slot) => markSlotFilled(slot, false));
        gearConfig.forEach((gear) => {
          const state = gearState.get(gear.id);
          state.placed = false;
          state.element.classList.remove("dragging", "is-placed", "is-spinning");
          state.element.style.zIndex = "";
        });

        relayout();
      }

      window.onPuzzleCompleted = function onPuzzleCompleted() {
        console.info("Puzzle de Engranajes completado. Integra aqui la siguiente pantalla.");

        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
            {
              type: "minijuego_engranajes:complete",
              payload: {
                solved: true
              }
            },
            "*"
          );
        }
      };

      if (resetButton) {
        resetButton.addEventListener("click", resetPuzzle);
      }
      continueButton.addEventListener("click", () => {
        window.onPuzzleCompleted();
      });

      window.addEventListener("resize", () => {
        cancelAnimationFrame(resizeFrame);
        resizeFrame = requestAnimationFrame(relayout);
      });

      createBoard();
    })();
  </script>
</body>
</html>
